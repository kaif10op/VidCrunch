version: "3.9"

services:
  # ── External Database (Postgres) configured in .env ──

  # ── External Redis configured in .env ──

  # ── FastAPI Backend ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      - OAUTH_REDIRECT_BASE=http://localhost:8000
    ports:
      - "8000:8000"

    volumes:
      - ./backend:/app
    command: >
      sh -c "python3 -m alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # ── Background Worker ──
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env

    volumes:
      - ./backend:/app
    command: arq app.workers.tasks.WorkerSettings

  # ── Vite Frontend ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
