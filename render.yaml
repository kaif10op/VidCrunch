services:
  - type: web
    name: vidcrunch-backend
    runtime: docker
    plan: free
    envVars:
      - key: APP_NAME
        value: VidCrunch
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GOOGLE_AI_KEY
        sync: false
      - key: XAI_API_KEY
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
      - key: JINA_API_KEY
        sync: false
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://vid-crunch.vercel.app
      - key: ALLOWED_ORIGINS
        value: http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:8080,https://vid-crunch.vercel.app,https://vid-crunch-la2swvn2d-kaif10ops-projects.vercel.app
