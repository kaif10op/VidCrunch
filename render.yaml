services:
  - type: web
    name: vidcrunch-backend
    runtime: docker
    dockerContext: backend
    dockerfilePath: Dockerfile
    envVars:
      - key: APP_NAME
        value: VidCrunch
      - key: DATABASE_URL
        fromDatabase:
          name: vidcrunch-db
          property: connectionString
      - key: REDIS_URL
        sync: false
